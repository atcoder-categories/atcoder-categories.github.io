<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Primitive Roots</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">

  <div class="header">
    <div class="breadcrumb"><a href="https://atcoder-categories.github.io" style="color: var(--text-muted); text-decoration: none;">Problems</a> &nbsp;/&nbsp; <span>Primitive Roots</span></div>
    <h1>Primitive Roots</h1>
  </div>

  <div class="user-bar">
    <input class="user-input" type="text" id="username-input" placeholder="atcoder username" />
    <button class="fetch-btn" id="fetch-btn" disabled>Fetch</button>
  </div>

  <div class="stats-bar">
    <div class="stat">Solved &nbsp;<span class="stat-count" id="stat-solved">— / —</span></div>
    <div class="stat">Attempting &nbsp;<span class="stat-count" id="stat-attempting">— / —</span></div>
  </div>

<div class="filter-bar">
  <div class="filter-row">
    <button class="filter-btn" data-filter="abc">ABC</button>
    <button class="filter-btn" data-filter="arc">ARC</button>
    <button class="filter-btn" data-filter="agc">AGC</button>
    <button class="filter-btn active" data-filter="all">All</button>
  </div>
  <div class="filter-row">
    <select class="filter-select" id="order-filter">
      <option value="new-to-old" selected>New to Old</option>
      <option value="old-to-new">Old to New</option>
      <option value="random">Random</option>
    </select>
    <button class="filter-btn" id="shuffle-btn">⇌ Shuffle</button>
    <select class="filter-select" id="difficulty-sort">
      <option value="none" selected>Don't Sort with Diff</option>
      <option value="easy-to-hard">Easy to Hard</option>
      <option value="hard-to-easy">Hard to Easy</option>
    </select>
    <div class="filter-divider"></div>
    <select class="filter-select" id="status-filter">
      <option value="" disabled>Filter by Status</option>
      <option value="all" selected>All</option>
      <option value="not-tried">Not Attempted</option>
      <option value="tried">Attempted</option>
      <option value="unsolved">Unsolved</option>
      <option value="solved">Solved</option>
    </select>
  </div>
  <div class="filter-row">
  <input class="filter-input" type="number" id="min-difficulty" placeholder="Min Difficulty" min="0">
  <input class="filter-input" type="number" id="max-difficulty" placeholder="Max Difficulty" min="0">
  <button class="filter-btn active" id="toggle-difficulty">Hide Difficulty</button>
</div>
</div>

  <div class="table-head">
    <span>#</span>
    <span>ID</span>
    <span>Title</span>
    <span>Difficulty</span>
    <span></span>
  </div>

  <div class="problem-list" id="problem-list"></div>

</div>
<button class="theme-btn" id="theme-btn">Light</button>
<script>
const PROBLEMS = [{"id": "abc212_g", "contest_id": "abc212", "problem_index": "G", "title": "G. Power Pair", "difficulty": 2150, "url": "https://atcoder.jp/contests/abc212/tasks/abc212_g", "datetime": 1627732800}, {"id": "abc335_g", "contest_id": "abc335", "problem_index": "G", "title": "G. Discrete Logarithm Problems", "difficulty": 2614, "url": "https://atcoder.jp/contests/abc335/tasks/abc335_g", "datetime": 1704542400}, {"id": "agc047_c", "contest_id": "agc047", "problem_index": "C", "title": "C. Product Modulo", "difficulty": 2496, "url": "https://atcoder.jp/contests/agc047/tasks/agc047_c", "datetime": 1596974400}, {"id": "arc166_f", "contest_id": "arc166", "problem_index": "F", "title": "F. Tangent Addition Formula", "difficulty": 3692, "url": "https://atcoder.jp/contests/arc166/tasks/arc166_f", "datetime": 1696766400}, {"id": "arc171_f", "contest_id": "arc171", "problem_index": "F", "title": "F. Both Reversible", "difficulty": 3730, "url": "https://atcoder.jp/contests/arc171/tasks/arc171_f", "datetime": 1707048000}, {"id": "arc190_d", "contest_id": "arc190", "problem_index": "D", "title": "D. Matrix Pow Sum", "difficulty": 2802, "url": "https://atcoder.jp/contests/arc190/tasks/arc190_d", "datetime": 1736683200}, {"id": "arc191_c", "contest_id": "arc191", "problem_index": "C", "title": "C. A^n - 1", "difficulty": 2198, "url": "https://atcoder.jp/contests/arc191/tasks/arc191_c", "datetime": 1737892800}];
</script>
<script src="scripts.js"></script>
</body>
</html>
