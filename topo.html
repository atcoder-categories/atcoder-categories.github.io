<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Topological Sorting</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">

  <div class="header">
    <div class="breadcrumb"><a href="https://atcoder-categories.github.io" style="color: var(--text-muted); text-decoration: none;">Problems</a> &nbsp;/&nbsp; <span>Topological Sorting</span></div>
    <h1>Topological Sorting</h1>
  </div>

  <div class="user-bar">
    <input class="user-input" type="text" id="username-input" placeholder="atcoder username" />
    <button class="fetch-btn" id="fetch-btn" disabled>Fetch</button>
  </div>

  <div class="stats-bar">
    <div class="stat">Solved &nbsp;<span class="stat-count" id="stat-solved">— / —</span></div>
    <div class="stat">Attempting &nbsp;<span class="stat-count" id="stat-attempting">— / —</span></div>
  </div>

<div class="filter-bar">
  <div class="filter-row">
    <button class="filter-btn" data-filter="abc">ABC</button>
    <button class="filter-btn" data-filter="arc">ARC</button>
    <button class="filter-btn" data-filter="agc">AGC</button>
    <button class="filter-btn active" data-filter="all">All</button>
  </div>
  <div class="filter-row">
    <select class="filter-select" id="order-filter">
      <option value="new-to-old">New to Old</option>
      <option value="old-to-new">Old to New</option>
      <option value="random" selected>Random</option>
    </select>
    <button class="filter-btn" id="shuffle-btn">⇌ Shuffle</button>
    <select class="filter-select" id="difficulty-sort" disabled>
      <option value="none" selected>Don't Sort with Diff</option>
      <option value="easy-to-hard">Easy to Hard</option>
      <option value="hard-to-easy">Hard to Easy</option>
    </select>
    <div class="filter-divider"></div>
    <select class="filter-select" id="status-filter">
      <option value="" disabled>Filter by Status</option>
      <option value="all" selected>All</option>
      <option value="not-tried">Not Attempted</option>
      <option value="tried">Attempted</option>
      <option value="unsolved">Unsolved</option>
      <option value="solved">Solved</option>
    </select>
  </div>
  <div class="filter-row">
  <input class="filter-input" type="number" id="min-difficulty" placeholder="Min Difficulty" min="0">
  <input class="filter-input" type="number" id="max-difficulty" placeholder="Max Difficulty" min="0">
  <button class="filter-btn active" id="toggle-difficulty">Hide Difficulty</button>
</div>
</div>

  <div class="table-head">
    <span>#</span>
    <span>ID</span>
    <span>Title</span>
    <span>Difficulty</span>
    <span></span>
  </div>

  <div class="problem-list" id="problem-list"></div>

</div>
<button class="theme-btn" id="theme-btn">Light</button>
<script>
const PROBLEMS = [{"id": "abc257_d", "contest_id": "abc257", "problem_index": "D", "title": "D. Jumping Takahashi 2", "difficulty": 1203, "url": "https://atcoder.jp/contests/abc257/tasks/abc257_d", "datetime": 1656158400}, {"id": "abc291_e", "contest_id": "abc291", "problem_index": "E", "title": "E. Find Permutation", "difficulty": 1069, "url": "https://atcoder.jp/contests/abc291/tasks/abc291_e", "datetime": 1677412800}, {"id": "abc304_h", "contest_id": "abc304", "problem_index": "Ex", "title": "Ex. Constrained Topological Sort", "difficulty": 2642, "url": "https://atcoder.jp/contests/abc304/tasks/abc304_h", "datetime": 1685793600}, {"id": "abc456_e", "contest_id": "abc456", "problem_index": "E", "title": "E. Endless Holidays", "difficulty": 1214, "url": "https://atcoder.jp/contests/abc456/tasks/abc456_e", "datetime": 1777723200}, {"id": "agc050_f", "contest_id": "agc050", "problem_index": "F", "title": "F. NAND Tree", "difficulty": 4076, "url": "https://atcoder.jp/contests/agc050/tasks/agc050_f", "datetime": 1608984000}, {"id": "arc143_e", "contest_id": "arc143", "problem_index": "E", "title": "E. Reversi", "difficulty": 2521, "url": "https://atcoder.jp/contests/arc143/tasks/arc143_e", "datetime": 1656244800}];
</script>
<script src="scripts.js"></script>
</body>
</html>
