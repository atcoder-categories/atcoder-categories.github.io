<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sprague-Grundy</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">

  <div class="header">
    <div class="breadcrumb"><a href="https://atcoder-categories.github.io" style="color: var(--text-muted); text-decoration: none;">Problems</a> &nbsp;/&nbsp; <span>Sprague-Grundy</span></div>
    <h1>Sprague-Grundy</h1>
  </div>

  <div class="user-bar">
    <input class="user-input" type="text" id="username-input" placeholder="atcoder username" />
    <button class="fetch-btn" id="fetch-btn" disabled>Fetch</button>
  </div>

  <div class="stats-bar">
    <div class="stat">Solved &nbsp;<span class="stat-count" id="stat-solved">— / —</span></div>
    <div class="stat">Attempting &nbsp;<span class="stat-count" id="stat-attempting">— / —</span></div>
  </div>

<div class="filter-bar">
  <div class="filter-row">
    <button class="filter-btn" data-filter="abc">ABC</button>
    <button class="filter-btn" data-filter="arc">ARC</button>
    <button class="filter-btn" data-filter="agc">AGC</button>
    <button class="filter-btn active" data-filter="all">All</button>
  </div>
  <div class="filter-row">
    <select class="filter-select" id="order-filter">
      <option value="new-to-old">New to Old</option>
      <option value="old-to-new">Old to New</option>
      <option value="random" selected>Random</option>
    </select>
    <button class="filter-btn" id="shuffle-btn">⇌ Shuffle</button>
    <select class="filter-select" id="difficulty-sort" disabled>
      <option value="none" selected>Don't Sort with Diff</option>
      <option value="easy-to-hard">Easy to Hard</option>
      <option value="hard-to-easy">Hard to Easy</option>
    </select>
    <div class="filter-divider"></div>
    <select class="filter-select" id="status-filter">
      <option value="" disabled>Filter by Status</option>
      <option value="all" selected>All</option>
      <option value="not-tried">Not Attempted</option>
      <option value="tried">Attempted</option>
      <option value="unsolved">Unsolved</option>
      <option value="solved">Solved</option>
    </select>
  </div>
  <div class="filter-row">
  <input class="filter-input" type="number" id="min-difficulty" placeholder="Min Difficulty" min="0">
  <input class="filter-input" type="number" id="max-difficulty" placeholder="Max Difficulty" min="0">
  <button class="filter-btn active" id="toggle-difficulty">Hide Difficulty</button>
</div>
</div>

  <div class="table-head">
    <span>#</span>
    <span>ID</span>
    <span>Title</span>
    <span>Difficulty</span>
    <span></span>
  </div>

  <div class="problem-list" id="problem-list"></div>

</div>
<button class="theme-btn" id="theme-btn">Light</button>
<script>
const PROBLEMS = [{"id": "abc206_f", "contest_id": "abc206", "problem_index": "F", "title": "F. Interval Game 2", "difficulty": 2221, "url": "https://atcoder.jp/contests/abc206/tasks/abc206_f", "datetime": 1624104000}, {"id": "abc229_h", "contest_id": "abc229", "problem_index": "H", "title": "H. Advance or Eat", "difficulty": 3308, "url": "https://atcoder.jp/contests/abc229/tasks/abc229_h", "datetime": 1638014400}, {"id": "abc255_g", "contest_id": "abc255", "problem_index": "G", "title": "G. Constrained Nim", "difficulty": 2734, "url": "https://atcoder.jp/contests/abc255/tasks/abc255_g", "datetime": 1654948800}, {"id": "abc265_h", "contest_id": "abc265", "problem_index": "Ex", "title": "Ex. No-capture Lance Game", "difficulty": 3319, "url": "https://atcoder.jp/contests/abc265/tasks/abc265_h", "datetime": 1661083200}, {"id": "abc278_g", "contest_id": "abc278", "problem_index": "G", "title": "G. Generalized Subtraction Game", "difficulty": 2533, "url": "https://atcoder.jp/contests/abc278/tasks/abc278_g", "datetime": 1668859200}, {"id": "abc297_g", "contest_id": "abc297", "problem_index": "G", "title": "G. Constrained Nim 2", "difficulty": 1834, "url": "https://atcoder.jp/contests/abc297/tasks/abc297_g", "datetime": 1681041600}, {"id": "abc368_f", "contest_id": "abc368", "problem_index": "F", "title": "F. Dividing Game", "difficulty": 1180, "url": "https://atcoder.jp/contests/abc368/tasks/abc368_f", "datetime": 1724500800}, {"id": "arc144_f", "contest_id": "arc144", "problem_index": "F", "title": "F. Arithmetic Sequence Nim", "difficulty": 3744, "url": "https://atcoder.jp/contests/arc144/tasks/arc144_f", "datetime": 1657972800}, {"id": "arc151_c", "contest_id": "arc151", "problem_index": "C", "title": "C. 01 Game", "difficulty": 1940, "url": "https://atcoder.jp/contests/arc151/tasks/arc151_c", "datetime": 1665921600}, {"id": "arc168_b", "contest_id": "arc168", "problem_index": "B", "title": "B. Arbitrary Nim", "difficulty": 1289, "url": "https://atcoder.jp/contests/arc168/tasks/arc168_b", "datetime": 1700395200}];
</script>
<script src="scripts.js"></script>
</body>
</html>
